<div class="auth-page forgot-page">
  <div class="auth-bg">
    <div class="auth-bg-shape auth-bg-shape-1"></div>
    <div class="auth-bg-shape auth-bg-shape-2"></div>
  </div>

  <div class="auth-container animate-in">
    <div class="auth-card">
      <div class="auth-card-header">
        <div class="auth-logo"><i class="bi bi-key-fill"></i></div>
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">{{ step === 1 ? 'Enter your email' : 'Enter OTP and new password' }}</p>
      </div>

      <div class="auth-card-body">
        <div *ngIf="step === 1" class="auth-form">
          <div class="form-group">
            <label class="form-label">Email</label>
            <div class="input-wrapper">
              <i class="bi bi-envelope input-icon"></i>
              <input type="email" [(ngModel)]="email" class="form-input" placeholder="your@email.com">
            </div>
          </div>
          <button class="btn-auth-primary" (click)="sendOtp()" [disabled]="loading">
            <span *ngIf="!loading">Send OTP</span>
            <span *ngIf="loading" class="btn-loading"><span class="spinner"></span> Sending...</span>
          </button>
        </div>

        <div *ngIf="step === 2" class="auth-form">
          <div class="form-group">
            <label class="form-label">OTP</label>
            <div class="input-wrapper">
              <i class="bi bi-shield-check input-icon"></i>
              <input type="text" [(ngModel)]="otp" class="form-input" placeholder="6-digit code">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <div class="input-wrapper">
              <i class="bi bi-lock input-icon"></i>
              <input type="password" [(ngModel)]="password" class="form-input" placeholder="New password">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div class="input-wrapper">
              <i class="bi bi-lock-fill input-icon"></i>
              <input type="password" [(ngModel)]="confirmPassword" class="form-input" placeholder="Confirm password">
            </div>
          </div>
          <button class="btn-auth-primary" (click)="resetPassword()" [disabled]="loading">
            <span *ngIf="!loading">Reset Password</span>
            <span *ngIf="loading" class="btn-loading"><span class="spinner"></span> Resetting...</span>
          </button>
        </div>

        <p class="auth-footer-text">
          <a routerLink="/login">Back to sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
