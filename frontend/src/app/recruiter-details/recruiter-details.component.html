<div class="page-container">
  <div *ngIf="resume" class="details-page animate-in">
    <div class="details-header">
      <a routerLink="/recruiter" class="back-link">
        <i class="bi bi-arrow-left me-2"></i>Back to Recruiter
      </a>
      <h1 class="page-title">{{ resume.name }}</h1>
      <div class="score-badge">
        <span class="score-value">{{ resume.score }}%</span>
        <span class="score-label">Match Score</span>
      </div>
    </div>

    <div class="skill-analysis-card">
      <h2 class="section-title">
        <i class="bi bi-bar-chart-steps me-2"></i>Skill Analysis
      </h2>

      <div *ngFor="let c of (resume.details?.category_match || {}) | keyvalue" class="category-block">
        <h3 class="category-name">{{ c.key }}</h3>
        <div class="skill-rows">
          <div class="skill-row">
            <span class="skill-label matched">Matched Skills</span>
            <span class="skill-value">{{ getMatched(c.value).join(', ') || 'None' }}</span>
          </div>
          <div class="skill-row">
            <span class="skill-label missing">Missing Skills</span>
            <span class="skill-value">{{ getMissing(c.value).join(', ') || 'None' }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
