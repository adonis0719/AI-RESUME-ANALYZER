<div class="admin-page page-container">
  <h1 class="admin-title">Admin Dashboard</h1>
  <p class="admin-subtitle">Manage users, resumes, and job descriptions</p>

  <div class="admin-cards">
    <a routerLink="/admin-dashboard/users" class="admin-card">
      <div class="admin-card-icon">
        <i class="bi bi-people-fill"></i>
      </div>
      <h3 class="admin-card-title">Users</h3>
      <p class="admin-card-desc">View and manage registered users</p>
    </a>
    <a routerLink="/admin-dashboard/resumes" class="admin-card">
      <div class="admin-card-icon">
        <i class="bi bi-file-earmark-pdf-fill"></i>
      </div>
      <h3 class="admin-card-title">Resumes</h3>
      <p class="admin-card-desc">View and manage uploaded resumes</p>
    </a>
    <a routerLink="/admin-dashboard/jobs" class="admin-card">
      <div class="admin-card-icon">
        <i class="bi bi-briefcase-fill"></i>
      </div>
      <h3 class="admin-card-title">Jobs</h3>
      <p class="admin-card-desc">View and manage job descriptions</p>
    </a>
  </div>
</div>
