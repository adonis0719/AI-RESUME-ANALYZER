<div class="auth-page register-page">
  <div class="auth-bg">
    <div class="auth-bg-shape auth-bg-shape-1"></div>
    <div class="auth-bg-shape auth-bg-shape-2"></div>
  </div>

  <div class="auth-container animate-in">
    <div class="auth-card">
      <div class="auth-card-header">
        <div class="auth-logo"><i class="bi bi-person-plus-fill"></i></div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">{{ step === 1 ? 'Step 1: Enter your details' : 'Step 2: Verify OTP' }}</p>
      </div>

      <div class="auth-card-body">
        <!-- STEP 1 -->
        <div *ngIf="step === 1" class="auth-form">
          <div class="form-group">
            <label class="form-label">Username</label>
            <div class="input-wrapper">
              <i class="bi bi-person input-icon"></i>
              <input type="text" [(ngModel)]="username" class="form-input" placeholder="Choose a username">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <div class="input-wrapper">
              <i class="bi bi-envelope input-icon"></i>
              <input type="email" [(ngModel)]="email" class="form-input" placeholder="your@email.com">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrapper">
              <i class="bi bi-lock input-icon"></i>
              <input type="password" [(ngModel)]="password" class="form-input" placeholder="Create a password">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div class="input-wrapper">
              <i class="bi bi-lock-fill input-icon"></i>
              <input type="password" [(ngModel)]="confirmPassword" class="form-input" placeholder="Confirm password">
            </div>
          </div>
          <button class="btn-auth-primary" (click)="sendOtp()" [disabled]="loading">
            <span *ngIf="!loading">Send OTP</span>
            <span *ngIf="loading" class="btn-loading"><span class="spinner"></span> Sending...</span>
          </button>
        </div>

        <!-- STEP 2 -->
        <div *ngIf="step === 2" class="auth-form">
          <div class="form-group">
            <label class="form-label">Enter OTP</label>
            <div class="input-wrapper">
              <i class="bi bi-shield-check input-icon"></i>
              <input type="text" [(ngModel)]="otp" class="form-input" placeholder="6-digit code">
            </div>
          </div>
          <button class="btn-auth-primary" (click)="verifyOtp()" [disabled]="loading">
            <span *ngIf="!loading">Verify OTP & Create Account</span>
            <span *ngIf="loading" class="btn-loading"><span class="spinner"></span> Verifying...</span>
          </button>
        </div>

        <p class="auth-footer-text">
          Already have an account? <a routerLink="/login">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
