<div class="container mt-4">

<h2>Register</h2>

<!-- STEP 1 : EMAIL + PASSWORD -->

<div *ngIf="step === 1">

<div class="mb-3">
<label>Username</label>
<input type="text"
[(ngModel)]="username"
class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email"
[(ngModel)]="email"
class="form-control">
</div>

<div class="mb-3">
<label>Password</label>
<input type="password"
[(ngModel)]="password"
class="form-control">
</div>

<div class="mb-3">
<label>Confirm Password</label>
<input type="password"
[(ngModel)]="confirmPassword"
class="form-control">
</div>

<button class="btn btn-dark"
(click)="sendOtp()">
Send OTP
</button>

</div>

<!-- STEP 2 : OTP -->

<div *ngIf="step === 2">

<div class="mb-3">
<label>Enter OTP</label>
<input type="text"
[(ngModel)]="otp"
class="form-control">
</div>

<button class="btn btn-success"
(click)="verifyOtp()">
Verify OTP & Create Account
</button>

</div>

</div>
