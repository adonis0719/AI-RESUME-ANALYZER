<div class="admin-page page-container">
  <h1 class="admin-title">Jobs</h1>
  <p class="admin-subtitle">Manage job descriptions</p>

  <div *ngIf="error" class="alert alert-danger" role="alert">{{ error }}</div>

  <div class="admin-section">
    <h2 class="section-title">
      <i class="bi bi-briefcase-fill"></i>
      All Jobs
    </h2>
    <div class="table-wrapper">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>User</th>
            <th>Created</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let j of jobs">
            <td>{{ j.id }}</td>
            <td>{{ j.title || '—' }}</td>
            <td>{{ j.user || '—' }}</td>
            <td>{{ j.created_at | date:'medium' }}</td>
            <td>
              <button class="btn-delete" (click)="deleteJob(j.id)" title="Delete job">
                <i class="bi bi-trash-fill"></i> Delete
              </button>
            </td>
          </tr>
          <tr *ngIf="jobs.length === 0">
            <td colspan="5" class="empty-cell">No jobs found</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
