<div class="admin-page page-container">
  <h1 class="admin-title">Resumes</h1>
  <p class="admin-subtitle">Manage uploaded resumes</p>

  <div *ngIf="error" class="alert alert-danger" role="alert">{{ error }}</div>

  <div class="admin-section">
    <h2 class="section-title">
      <i class="bi bi-file-earmark-pdf-fill"></i>
      All Resumes
    </h2>
    <div class="table-wrapper">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>User</th>
            <th>Email</th>
            <th>Uploaded</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of resumes">
            <td>{{ r.id }}</td>
            <td>{{ r.title || '—' }}</td>
            <td>{{ r.user || '—' }}</td>
            <td>{{ r.candidate_email || '—' }}</td>
            <td>{{ r.uploaded_at | date:'medium' }}</td>
            <td>
              <button class="btn-delete" (click)="deleteResume(r.id)" title="Delete resume">
                <i class="bi bi-trash-fill"></i> Delete
              </button>
            </td>
          </tr>
          <tr *ngIf="resumes.length === 0">
            <td colspan="6" class="empty-cell">No resumes found</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
