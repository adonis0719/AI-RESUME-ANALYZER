<nav *ngIf="showNavbar" class="app-navbar">
  <div class="nav-inner">
    <a class="nav-brand" [routerLink]="isAdminRoute ? '/admin-dashboard' : '/dashboard'">
      <span class="nav-brand-icon">A</span>
      <span class="nav-brand-text">AI Resume Analyzer</span>
    </a>

    <button class="nav-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
      <i class="bi bi-list"></i>
    </button>

    <div class="nav-collapse collapse" id="mainNav">
      <div class="nav-links">
        <ng-container *ngIf="isAdminRoute; else userNav">
          <a class="nav-link" routerLink="/admin-dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <i class="bi bi-shield-lock-fill"></i>
            <span>Admin</span>
          </a>
          <a class="nav-link" routerLink="/admin-dashboard/users" routerLinkActive="active">
            <i class="bi bi-people-fill"></i>
            <span>Users</span>
          </a>
          <a class="nav-link" routerLink="/admin-dashboard/resumes" routerLinkActive="active">
            <i class="bi bi-file-earmark-pdf-fill"></i>
            <span>Resumes</span>
          </a>
          <a class="nav-link" routerLink="/admin-dashboard/jobs" routerLinkActive="active">
            <i class="bi bi-briefcase-fill"></i>
            <span>Jobs</span>
          </a>
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>User Dashboard</span>
          </a>
        </ng-container>
        <ng-template #userNav>
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>Dashboard</span>
          </a>
          <a class="nav-link" routerLink="/recruiter" routerLinkActive="active">
            <i class="bi bi-briefcase-fill"></i>
            <span>Recruiter Analyzer</span>
          </a>
          <a class="nav-link" routerLink="/profile" routerLinkActive="active">
            <i class="bi bi-person-fill"></i>
            <span>Profile</span>
          </a>
          <a class="nav-link" routerLink="/ai-assistant" routerLinkActive="active">
            <i class="bi bi-chat-dots-fill"></i>
            <span>AI Assistant</span>
          </a>
          <a *ngIf="authService.isAdmin()" class="nav-link" routerLink="/admin-dashboard" routerLinkActive="active">
            <i class="bi bi-shield-lock-fill"></i>
            <span>Admin</span>
          </a>
        </ng-template>
        <a class="nav-link nav-link-logout" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i>
          <span>Logout</span>
        </a>
      </div>
      <button class="btn-theme" (click)="toggleTheme()" [title]="themeService.getTheme() === 'light' ? 'Dark mode' : 'Light mode'">
        <i class="bi" [ngClass]="themeService.getTheme() === 'light' ? 'bi-moon-stars-fill' : 'bi-sun-fill'"></i>
      </button>
    </div>
  </div>
</nav>

<main class="app-main">
  <router-outlet></router-outlet>
</main>
