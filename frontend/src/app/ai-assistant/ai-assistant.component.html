<div class="ai-assistant-page">
  <header class="assistant-header">
    <h1 class="page-title">AI Career Advisor</h1>
    <p class="page-subtitle">Ask questions about career paths, skills, and resume advice</p>
  </header>

  <div class="chat-container">
    <div class="messages-panel" #messagesContainer>
      <div #messageRow *ngFor="let msg of messages" class="message-row" [class.user]="msg.sender === 'user'" [class.ai]="msg.sender === 'ai'">
        <div class="message-bubble">
          <span class="message-text" [innerHTML]="formatMessage(msg.text)"></span>
        </div>
      </div>
      <div *ngIf="loading" class="message-row ai">
        <div class="message-bubble loading-bubble">
          <span class="typing-indicator">
            <span></span><span></span><span></span>
          </span>
        </div>
      </div>
    </div>

    <div class="input-area">
      <textarea
        class="chat-input"
        [(ngModel)]="inputText"
        (keydown)="onKeydown($event)"
        placeholder="Ask a question... (e.g. How do I become a DevOps engineer?)"
        rows="2"
        [disabled]="loading"
      ></textarea>
      <button class="send-btn" (click)="sendMessage()" [disabled]="!inputText.trim() || loading">
        <i class="bi bi-send-fill"></i> Send
      </button>
    </div>
  </div>
</div>
