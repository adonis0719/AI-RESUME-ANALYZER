<div class="container mt-4">

<h2>Recruiter Resume Screening</h2>

<div class="mb-3">
<label>Select Resumes</label>
<input type="file" (change)="onFileSelect($event)" multiple class="form-control">
</div>

<div class="mb-3">
<label>Job Description</label>
<textarea [(ngModel)]="jobDescription" rows="6" class="form-control"></textarea>
</div>

<button class="btn btn-dark" (click)="analyze()">Analyze</button>

<hr>

<h3 *ngIf="results.length">Ranked Resumes</h3>

<button class="btn btn-success mb-3"
(click)="downloadReport()"
*ngIf="results.length">

Download Report

</button>

<button class="btn btn-warning mb-3"
(click)="clearResults()"
*ngIf="results.length">

Clear Results

</button>

<table class="table table-bordered" *ngIf="results.length">

<thead>
<tr>
<th>Rank</th>
<th>Resume</th>
<th>Score</th>
<th>Details</th>
</tr>
</thead>

<tbody>
<tr *ngFor="let r of results; let i = index">

<td>{{ i+1 }}</td>

<td>
<a [href]="'http://127.0.0.1:8000' + r.file_url" target="_blank">
{{ r.name }}
</a>
</td>

<td>{{ r.score }} %</td>

<td>
<button class="btn btn-info btn-sm"
(click)="openDetails(r)">
More Details
</button>
</td>

</tr>
</tbody>

</table>

<div *ngIf="selectedDetails" class="mt-4">

<h4>Matched / Missing Skills</h4>

<div *ngFor="let c of selectedDetails.category_match | keyvalue">

<h5>{{c.key}}</h5>

<p><b>Matched:</b> {{ getMatched(c.value).join(', ') }}</p>
<p><b>Missing:</b> {{ getMissing(c.value).join(', ') }}</p>

</div>

</div>

</div>
