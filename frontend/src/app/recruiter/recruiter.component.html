<div class="container mt-4">

<h2>Recruiter Resume Screening</h2>

<div class="mb-3">
<label>Select Resumes</label>
<input type="file" (change)="onFileSelect($event)" multiple class="form-control">
</div>

<div class="mb-3">
<label>Job Description</label>
<textarea [(ngModel)]="jobDescription" rows="6" class="form-control"></textarea>
</div>

<button class="btn btn-dark" (click)="analyze()">Analyze</button>

<hr>

<h3 *ngIf="results.length">Ranked Resumes</h3>

<table class="table table-bordered" *ngIf="results.length">

<thead>
<tr>
<th>Rank</th>
<th>Resume</th>
<th>Score</th>
</tr>
</thead>

<tbody>
<tr *ngFor="let r of results; let i = index">

<td>{{ i+1 }}</td>

<td>
<a [href]="'http://127.0.0.1:8000' + r.file_url" target="_blank">
{{ r.name }}
</a>
</td>

<td>{{ r.score }} %</td>

</tr>
</tbody>

</table>

</div>
