<div class="page-container recruiter-page">
  <header class="recruiter-header animate-in">
    <h1 class="page-title">Recruiter Resume Screening</h1>
  </header>

  <div class="recruiter-content">
    <!-- Upload Section - Two columns -->
    <div class="recruiter-upload-section animate-in animate-delay-1">
      <div class="upload-col upload-resumes">
        <label class="form-label">Upload Resumes</label>
        <div class="file-zone" (click)="fileInput.click()">
          <input #fileInput type="file" multiple (change)="onFileSelect($event)" class="file-input-hidden">
          <i class="bi bi-cloud-arrow-up"></i>
          <p>Drag and drop multiple resumes</p>
          <button type="button" class="btn-choose">Choose Files</button>
          <span class="file-count" *ngIf="files.length">{{ files.length }} Files</span>
        </div>
      </div>
      <div class="upload-col upload-job">
        <label class="form-label">Job Description</label>
        <textarea [(ngModel)]="jobDescription" rows="8" class="form-textarea" placeholder="Paste job description here..."></textarea>
        <button class="btn-analyze" (click)="analyze()" [disabled]="loading">
          <span *ngIf="!loading"><i class="bi bi-graph-up-arrow me-2"></i>Analyze</span>
          <span *ngIf="loading" class="btn-loading"><span class="spinner"></span> Analyzing...</span>
        </button>
      </div>
    </div>

    <!-- Results Section -->
    <div *ngIf="results.length" class="recruiter-results animate-in" id="recruiterResultsSection">
      <div class="results-toolbar">
        <button class="btn-download" (click)="downloadReport()">
          <i class="bi bi-download me-2"></i>Download Report
        </button>
        <button class="btn-clear" (click)="clearResults()">Clear Results</button>
        <button class="btn-schedule" (click)="scheduleInterview()">
          <i class="bi bi-calendar-event me-2"></i>Schedule Interview
        </button>
      </div>

      <div class="rank-cards">
        <div class="rank-card" *ngFor="let r of results; let i = index">
          <span class="rank-label">Rank {{ i + 1 }}</span>
          <div class="rank-circle" [style.--value]="r.score">
            <span>{{ r.score }}%</span>
          </div>
          <button class="btn-full-analysis" (click)="openDetails(r)">
            <i class="bi bi-bar-chart me-2"></i>Full Analysis
          </button>
        </div>
      </div>

      <div class="resume-list">
        <h4>Resumes</h4>
        <ul>
          <li *ngFor="let r of results; let i = index">
            <input type="checkbox" [(ngModel)]="r.selected" class="resume-select-checkbox" />
            <i class="bi bi-file-earmark-pdf"></i>
            <a [href]="'http://127.0.0.1:8000' + r.file_url" target="_blank">{{ r.name }}</a>
            <span class="rank-badge">Rank {{ i + 1 }}</span>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
